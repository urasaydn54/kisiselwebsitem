<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kişisel Portfolyo</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: white; text-align: center; margin: 0; padding: 0; }
        header { padding: 100px 20px; background: linear-gradient(45deg, #1e1e1e, #333); }
        h1 { font-size: 3rem; margin-bottom: 10px; }
        p { color: #bbb; font-size: 1.2rem; }
        .container { padding: 50px; }
        .btn { display: inline-block; padding: 12px 24px; background: #007bff; color: white; text-decoration: none; border-radius: 5px; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: #0056b3; }
    </style>
</head>
<body>
    <header>
        <h1>Merhaba, Ben Uras</h1>
        <p>Geliştirici | Teknoloji Meraklısı | Tasarımcı</p>
        <a href="#iletisim" class="btn">Bana Ulaşın</a>
    </header>
    <div class="container">
        <h2>Kişisel bilgiler</h2>
        <p>16 yaşımdayım, sakaryada yaşıyorum borsa istanbul teknik anadolu meslek lisesinde bilişim okuyorum.</p>
    </div>
</body>
</html>
